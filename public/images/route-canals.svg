<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Каналы Петербурга">
  <defs>
    <linearGradient id="c-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7eff4"/>
      <stop offset="1" stop-color="#d6e4ec"/>
    </linearGradient>
    <linearGradient id="c-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6f9bb3"/>
      <stop offset="1" stop-color="#274f68"/>
    </linearGradient>
    <linearGradient id="c-houseL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cdb79a"/>
      <stop offset="1" stop-color="#a8906f"/>
    </linearGradient>
    <linearGradient id="c-houseR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b9c2c8"/>
      <stop offset="1" stop-color="#8c989f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#c-sky)"/>

  <!-- left facades -->
  <g fill="url(#c-houseL)">
    <rect x="0" y="120" width="150" height="220"/>
    <rect x="150" y="160" width="120" height="180"/>
  </g>
  <g fill="#7d6750" opacity="0.6">
    <rect x="24" y="160" width="24" height="34"/><rect x="64" y="160" width="24" height="34"/><rect x="104" y="160" width="24" height="34"/>
    <rect x="24" y="220" width="24" height="34"/><rect x="64" y="220" width="24" height="34"/><rect x="104" y="220" width="24" height="34"/>
    <rect x="174" y="200" width="22" height="30"/><rect x="214" y="200" width="22" height="30"/>
  </g>

  <!-- right facades -->
  <g fill="url(#c-houseR)">
    <rect x="650" y="120" width="150" height="220"/>
    <rect x="540" y="170" width="110" height="170"/>
  </g>
  <g fill="#5e6a72" opacity="0.6">
    <rect x="676" y="160" width="24" height="34"/><rect x="716" y="160" width="24" height="34"/><rect x="756" y="160" width="24" height="34"/>
    <rect x="676" y="220" width="24" height="34"/><rect x="716" y="220" width="24" height="34"/><rect x="756" y="220" width="24" height="34"/>
    <rect x="562" y="206" width="22" height="30"/><rect x="602" y="206" width="22" height="30"/>
  </g>

  <!-- low arched bridge -->
  <g fill="#5b4a3c">
    <path d="M280 300 q120 -70 240 0 l0 14 q-120 -62 -240 0 z"/>
    <rect x="280" y="300" width="240" height="14"/>
  </g>
  <path d="M300 314 q100 -50 200 0 z" fill="url(#c-water)" opacity="0.5"/>

  <rect y="340" width="800" height="160" fill="url(#c-water)"/>
  <g stroke="#d6ebf1" stroke-opacity="0.35" stroke-width="4" fill="none">
    <path d="M120 410 q60 -12 120 0 t120 0"/>
    <path d="M520 444 q60 -12 120 0 t120 0"/>
  </g>

  <g transform="translate(400 404)">
    <path d="M-110 28 q110 46 220 0 l-24 40 q-88 28 -172 0 z" fill="#0f4c75"/>
    <rect x="-46" y="-10" width="92" height="30" rx="6" fill="#eef5f9"/>
    <rect x="-34" y="-2" width="68" height="18" rx="4" fill="#8cc0db"/>
  </g>
</svg>
