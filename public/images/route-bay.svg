<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Финский залив">
  <defs>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dff1f4"/>
      <stop offset="0.6" stop-color="#cde9ec"/>
      <stop offset="1" stop-color="#aedbe0"/>
    </linearGradient>
    <linearGradient id="g-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fb2c0"/>
      <stop offset="0.5" stop-color="#2a93a6"/>
      <stop offset="1" stop-color="#15596a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g-sky)"/>
  <circle cx="180" cy="110" r="60" fill="#ffffff" opacity="0.5"/>
  <g fill="#ffffff" opacity="0.5">
    <ellipse cx="560" cy="120" rx="60" ry="18"/>
    <ellipse cx="610" cy="108" rx="44" ry="16"/>
  </g>

  <!-- tall spire on horizon -->
  <g fill="#3f7d8c" opacity="0.85">
    <path d="M636 322 l14 -210 14 210 z"/>
    <rect x="642" y="112" width="16" height="6"/>
    <rect x="644" y="90" width="12" height="22"/>
  </g>
  <g fill="#3f7d8c" opacity="0.5">
    <rect x="540" y="300" width="40" height="22"/>
    <rect x="690" y="304" width="34" height="18"/>
  </g>

  <rect y="322" width="800" height="178" fill="url(#g-water)"/>
  <g stroke="#e0f4f6" stroke-opacity="0.45" stroke-width="4" fill="none">
    <path d="M70 388 q70 -14 140 0 t140 0"/>
    <path d="M470 430 q70 -14 140 0 t140 0"/>
    <path d="M120 470 q70 -14 140 0 t140 0"/>
  </g>

  <!-- boat with sail -->
  <g transform="translate(300 400)">
    <path d="M-120 30 q120 48 240 0 l-26 44 q-96 30 -188 0 z" fill="#0c3a5a"/>
    <path d="M-96 26 q96 38 192 0 l-14 24 q-82 26 -164 0 z" fill="#1d8ea0"/>
    <rect x="-6" y="-110" width="10" height="110" rx="4" fill="#0c3a5a"/>
    <path d="M4 -106 l66 96 -66 0 z" fill="#f3f7fa"/>
    <path d="M-6 -96 l-54 86 54 0 z" fill="#cfe6ee"/>
  </g>
</svg>
