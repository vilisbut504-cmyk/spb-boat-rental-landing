<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1250" width="1000" height="1250" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Катер на воде Невы на фоне заката">
  <defs>
    <linearGradient id="h-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3eff6"/>
      <stop offset="0.4" stop-color="#eee7da"/>
      <stop offset="0.66" stop-color="#f6d9b6"/>
      <stop offset="0.86" stop-color="#f3bd8e"/>
      <stop offset="1" stop-color="#ea9d6e"/>
    </linearGradient>
    <linearGradient id="h-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3a878"/>
      <stop offset="0.14" stop-color="#a9c0cb"/>
      <stop offset="0.45" stop-color="#3f7c98"/>
      <stop offset="1" stop-color="#103c54"/>
    </linearGradient>
    <radialGradient id="h-sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff6ea"/>
      <stop offset="0.5" stop-color="#ffdca6"/>
      <stop offset="1" stop-color="#ffdca6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="760" fill="url(#h-sky)"/>
  <circle cx="560" cy="660" r="320" fill="url(#h-sun)"/>
  <circle cx="560" cy="660" r="86" fill="#fff2da"/>

  <g opacity="0.4" fill="#f3e6d2">
    <circle cx="180" cy="150" r="3"/>
    <circle cx="820" cy="120" r="2.4"/>
    <circle cx="300" cy="90" r="2"/>
    <circle cx="700" cy="220" r="2"/>
  </g>

  <!-- faint skyline -->
  <g fill="#5d7184" opacity="0.55">
    <rect x="40" y="676" width="90" height="84"/>
    <rect x="140" y="700" width="56" height="60"/>
    <path d="M196 700 h24 l-12 -28 z"/>
    <rect x="250" y="668" width="70" height="92"/>
    <rect x="740" y="690" width="60" height="70"/>
    <path d="M770 690 v-34 l6 -16 6 16 v34 z"/>
    <rect x="828" y="664" width="92" height="96"/>
    <rect x="930" y="700" width="50" height="60"/>
  </g>

  <!-- thin bridge line -->
  <g fill="#3a4f60" opacity="0.7">
    <rect x="360" y="744" width="280" height="9"/>
    <rect x="384" y="724" width="9" height="22"/>
    <rect x="607" y="724" width="9" height="22"/>
  </g>

  <rect y="760" width="1000" height="490" fill="url(#h-water)"/>

  <!-- sun reflection -->
  <g fill="#ffe2b4" opacity="0.5">
    <rect x="528" y="772" width="64" height="9" rx="4.5"/>
    <rect x="516" y="798" width="88" height="8" rx="4"/>
    <rect x="534" y="828" width="52" height="7" rx="3.5"/>
    <rect x="510" y="862" width="100" height="8" rx="4"/>
    <rect x="540" y="900" width="40" height="7" rx="3.5"/>
  </g>

  <!-- water highlights -->
  <g stroke="#d6ebf1" stroke-opacity="0.4" stroke-width="4" fill="none">
    <path d="M90 850 q70 -14 140 0 t140 0"/>
    <path d="M620 930 q70 -14 140 0 t140 0"/>
    <path d="M140 1010 q70 -14 140 0 t140 0"/>
  </g>

  <!-- boat with wake -->
  <g transform="translate(500 980)">
    <path d="M-330 80 q330 36 0 110 q-260 -30 -330 -90 z" fill="#0d4c70" opacity="0.18"/>
    <path d="M-200 64 q200 92 400 0 l-44 84 q-176 56 -312 0 z" fill="#0f4c75"/>
    <path d="M-168 60 q168 74 336 0 l-22 42 q-160 50 -292 0 z" fill="#1f7aa8"/>
    <rect x="-104" y="-18" width="208" height="64" rx="12" fill="#f3f7fa"/>
    <rect x="-84" y="-4" width="168" height="38" rx="6" fill="#8cc0db"/>
    <rect x="-12" y="-84" width="16" height="66" rx="5" fill="#0f4c75"/>
    <path d="M4 -80 l72 38 -72 12 z" fill="#d9b27c"/>
  </g>
</svg>
